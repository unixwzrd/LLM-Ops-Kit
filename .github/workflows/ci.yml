name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Shell syntax checks
        run: |
          bash -n scripts/lib/common.sh
          bash -n scripts/modelctl
          bash -n scripts/tts-bridge
          bash -n scripts/model-proxy
          bash -n scripts/gateway

      - name: Shellcheck wrappers
        run: |
          shellcheck scripts/lib/common.sh scripts/modelctl scripts/tts-bridge scripts/model-proxy scripts/gateway

      - name: Run Python regression tests
        run: |
          python -m unittest discover -s scripts/tests -p 'test_*.py'
